"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "Hojin Ghim"

[ui]
default-command = "log"
merge-editor = "vimdiff"

[merge-tools.vimdiff]
program = "nvim"
merge-args = ["-f", "-d", "$output", "-M",
    "$left", "$base", "$right",
    "-c", "wincmd J", "-c", "set modifiable",
    "-c", "set write"]
merge-tool-edits-conflict-markers = true
