[main]
# Kinesis Advantage2 in Mac mode — keycodes differ from PC layout
# These remaps run before default.conf rules apply

# Left Ctrl → Super (then default.conf: Super tap → albert)
leftcontrol = leftmeta

# Right Super(97) → Super
rightcontrol = leftmeta

# Right Ctrl(126) → Esc
rightmeta = esc

# Left Alt → Esc
leftalt = esc

# End → Left Alt (then default.conf: Alt_L tap → ghostty1)
end = leftalt

# PgDn → Right Alt (then default.conf: Alt_R tap → ghostty2)
pagedown = rightalt

# apostrophe → Right Ctrl (then default.conf: Ctrl_R tap → apostrophe)
apostrophe = rightcontrol

# backslash → Tab
backslash = tab

# PgUp → backslash
pageup = backslash
