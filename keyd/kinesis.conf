# keyd config for Kinesis Advantage2 Keyboard (Mac mode)
#
# The keyboard is in Mac mode, which swaps Ctrl↔Cmd at the hardware level.
# No onboard remaps — all remapping done here via aliases + common bindings.
# Aliases remap physical keycodes before common bindings apply.
#
# Physical Layout (Mac mode keycodes)
# ===================================
# In Mac mode the top four thumb keys are: Cmd | Option | Ctrl | Cmd
# Keycodes shown are what Linux sees (evdev), not what the keycap says.
#
# LEFT HAND                                              RIGHT HAND
#
#  ┌─────┬─────┬─────┬─────┬─────┬─────┐  ┌─────┬─────┬─────┬─────┬─────┬─────┐
#  │ =   │ 1   │ 2   │ 3   │ 4   │ 5   │  │ 6   │ 7   │ 8   │ 9   │ 0   │ -   │
#  │(13) │     │     │     │     │     │  │     │     │     │     │     │(12) │
#  ├─────┼─────┼─────┼─────┼─────┼─────┤  ├─────┼─────┼─────┼─────┼─────┼─────┤
#  │Tab  │ Q   │ W   │ E   │ R   │ T   │  │ Y   │ U   │ I   │ O   │ P   │ \   │
#  │     │     │     │     │     │     │  │     │     │     │     │     │(43) │
#  ├─────┼─────┼─────┼─────┼─────┼─────┤  ├─────┼─────┼─────┼─────┼─────┼─────┤
#  │Caps │ A   │ S   │ D   │ F   │ G   │  │ H   │ J   │ K   │ L   │ ;   │ '   │
#  │     │     │     │     │     │     │  │     │     │     │     │     │(40) │
#  ├─────┼─────┼─────┼─────┼─────┼─────┤  ├─────┼─────┼─────┼─────┼─────┼─────┤
#  │LShft│ Z   │ X   │ C   │ V   │ B   │  │ N   │ M   │ ,   │ .   │ /   │RShft│
#  └─────┼─────┼─────┼─────┼─────┼─────┘  └─────┼─────┼─────┼─────┼─────┼─────┘
#        │ `   │ <   │Left │Right│              │ Up  │Down │ [   │ ]   │
#        └─────┴─────┴─────┴─────┘              └─────┴─────┴─────┴─────┘
#
#           LEFT THUMB CLUSTER                      RIGHT THUMB CLUSTER
#
#                ┌─────┬─────┐        ┌─────┬─────┐
#                │ Cmd │ Opt │        │Ctrl │ Cmd │
#                │(29) │(56) │        │(126)│(97) │
#          ┌─────┼─────┼─────┤        ├─────┼─────┼─────┐
#          │     │     │Home │        │PgUp │     │     │
#          │BkSp │ Del │     │        │(104)│Enter│Space│
#          │     │     ├─────┤        ├─────┤     │     │
#          │     │     │ End │        │PgDn │     │     │
#          │     │     │(107)│        │(109)│     │     │
#          └─────┴─────┴─────┘        └─────┴─────┴─────┘
#
# Final effective layout (aliases + common bindings)
# ==================================================
# Hold behavior shown in key, tap behavior in parentheses.
#
# LEFT HAND                                              RIGHT HAND
#
#  ┌─────┬─────┬─────┬─────┬─────┬─────┐  ┌─────┬─────┬─────┬─────┬─────┬─────┐
#  │ =   │ 1   │ 2   │ 3   │ 4   │ 5   │  │ 6   │ 7   │ 8   │ 9   │ 0   │ -   │
#  ├─────┼─────┼─────┼─────┼─────┼─────┤  ├─────┼─────┼─────┼─────┼─────┼─────┤
#  │Tab  │ Q   │ W   │ E   │ R   │ T   │  │ Y   │ U   │ I   │ O   │ P   │ Tab │
#  ├─────┼─────┼─────┼─────┼─────┼─────┤  ├─────┼─────┼─────┼─────┼─────┼─────┤
#  │Ctrl │ A   │ S   │ D   │ F   │ G   │  │ H   │ J   │ K   │ L   │ ;   │Ctrl │
#  │(Esc)│     │     │     │     │     │  │     │     │     │     │     │(')  │
#  ├─────┼─────┼─────┼─────┼─────┼─────┤  ├─────┼─────┼─────┼─────┼─────┼─────┤
#  │LShft│ Z   │ X   │ C   │ V   │ B   │  │ N   │ M   │ ,   │ .   │ /   │RShft│
#  └─────┼─────┼─────┼─────┼─────┼─────┘  └─────┼─────┼─────┼─────┼─────┼─────┘
#        │ `   │ <   │Left │Right│              │ Up  │Down │ [   │ ]   │
#        └─────┴─────┴─────┴─────┘              └─────┴─────┴─────┴─────┘
#
#           LEFT THUMB CLUSTER                      RIGHT THUMB CLUSTER
#
#                ┌─────┬─────┐        ┌─────┬─────┐
#                │Super│ Esc │        │ Esc │Super│
#                │(tap │     │        │     │(tap │
#                │Albrt)     │        │     │Albrt)
#          ┌─────┼─────┼─────┤        ├─────┼─────┼─────┐
#          │BkSp │ Del │Home │        │  \  │     │     │
#          │     │     │     │        │     │Enter│Space│
#          │     │     ├─────┤        ├─────┤     │     │
#          │     │     │ Alt │        │ Alt │     │     │
#          │     │     │(tap │        │(tap │     │     │
#          │     │     │ gh1)│        │ gh2)│     │     │
#          └─────┴─────┴─────┘        └─────┴─────┴─────┘
#
# Summary table
# =============
# Physical key   │ Evdev │ Alias to    │ Final (via common)        │
# ───────────────┼───────┼─────────────┼───────────────────────────┤
# L Cmd          │ 29    │ leftmeta    │ Super (tap: Albert)       │
# L Option       │ 56    │ escape      │ Escape                    │
# End            │ 107   │ leftalt     │ Alt (tap: ghostty1)       │
# R Cmd          │ 97    │ leftmeta    │ Super (tap: Albert)       │
# R Ctrl         │ 126   │ escape      │ Escape                    │
# PgUp           │ 104   │ backslash   │ backslash                 │
# PgDn           │ 109   │ rightalt    │ Alt (tap: ghostty2)       │
# apostrophe     │ 40    │ rightcontrol│ Control (tap: apostrophe) │
# backslash      │ 43    │ tab         │ Tab                       │

[ids]
29ea:0102

[aliases]

# Thumb keys
leftcontrol = leftmeta
leftalt = escape
end = leftalt
pagedown = rightalt

# Right side
rightcontrol = leftmeta
rightmeta = escape
apostrophe = rightcontrol

# Tab/backslash swap
backslash = tab
pageup = backslash

[main]
include common
