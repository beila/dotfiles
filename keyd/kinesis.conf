[ids]
29ea:0102

[aliases]
# Kinesis Advantage2 Mac mode — physical keycodes differ from PC layout
# Aliases remap keys before common bindings apply

# Thumb keys
leftcontrol = leftmeta
leftalt = escape
end = leftalt
pagedown = rightalt

# Right side
rightcontrol = leftmeta
rightmeta = escape
apostrophe = rightcontrol

# Tab/backslash swap
backslash = tab
pageup = backslash

[main]
include common
