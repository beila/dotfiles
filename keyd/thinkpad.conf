# keyd config for ThinkPad laptop keyboard (AT Translated Set 2)
#
# Copilot key (between AltGr and RCtrl)
# ======================================
# Microsoft defined Meta+Shift+F23 as the Copilot shortcut, and Lenovo
# hardwired this combo into the keyboard firmware. The key does NOT send
# a single scancode — it physically presses Meta+Shift+F23 simultaneously.
#
# Raw hardware behavior (observed via keyd monitor):
#   Tap:  leftmeta down, leftshift down, f23 down, f23 up, leftshift up, leftmeta up
#   Hold: leftmeta down, f23 down, ... (held) ..., f23 up, leftmeta up
#         (leftshift sometimes absent on hold — firmware inconsistency)
#
# Remapping strategy:
#   1. leftshift+leftmeta chord → layer(meta)
#      Captures the modifier combo the Copilot key sends, activating the
#      Super modifier layer. This allows Copilot+<key> to work as Super+<key>.
#
#   2. f23 = prog1 (in [main])
#      Fallback if f23 arrives outside the meta layer.
#
#   3. f23 = macro(prog1) (in [meta] layer)
#      When f23 arrives while the meta layer is active (i.e. during the
#      Copilot keypress), emit prog1 WITHOUT the Super modifier attached.
#      Using macro() strips the layer's modifier from the output.
#      xmonad binds prog1/XF86Launch1 with no modifiers → Albert toggle.
#
# Result:
#   Tap Copilot     → prog1 → Albert toggle (no modifiers)
#   Hold Copilot+key → Super+key (normal Super modifier behavior)
#
# Reference: https://superuser.com/questions/1849424

[ids]
0001:0001:09b4e68d

[main]
include common

leftshift+leftmeta = layer(meta)
f23 = prog1

[meta]
f23 = macro(prog1)
