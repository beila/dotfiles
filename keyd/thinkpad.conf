# keyd config for ThinkPad laptop keyboard (AT Translated Set 2)
#
# Copilot key (between AltGr and RCtrl): a hardware-macro chord
# leftmeta+leftshift+f23, NOT a single keycode. Making it tap=Albert /
# hold=Super is SHELVED — not achievable in keyd without losing
# Super-key-tap=Albert (which is used more). Full investigation, the raw
# firmware capture, every failed attempt, and the revisit notes live in
# keyd/AGENTS.md ("Copilot key — SHELVED").
#
# All this file does is suppress the stray F23 so a Copilot tap doesn't type
# <2a> into the focused app. On hold, common's natural handling passes
# leftmeta+leftshift through as Super+Shift (usable for non-shift Super binds).

[ids]
0001:0001:09b4e68d

[main]
include common

f23 = noop
