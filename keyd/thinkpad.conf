# keyd config for ThinkPad laptop keyboard
# Copilot key (between AltGr and RCtrl) sends Meta+Shift+F23 at hardware level
# The key fires press+release instantly (no hold), so oneshot is used

[ids]
0001:0001:09b4e68d

[main]
include common

# Copilot key sends Meta+Shift+F23 (or Meta+F23) at hardware level
# Chord captures the modifiers as meta layer, f23 mapped to prog1
# In meta layer, f23 explicitly fires prog1 without Super modifier
leftshift+leftmeta = layer(meta)
f23 = prog1

[meta]
f23 = macro(prog1)
