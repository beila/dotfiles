# keyd default config — all keyboards except those with device-specific configs
# See 'common' for shared bindings, 'kinesis.conf' and 'thinkpad.conf' for device-specific
#
# Effective layout (common bindings applied):
#   CapsLock: hold Ctrl, tap Esc
#   Super: hold Super, tap Albert (prog1)
#   Left Alt: hold Alt, tap ghostty1 (prog2)
#   Right Alt: hold Alt, tap ghostty2 (prog3)
#   Right Ctrl: hold Ctrl, tap apostrophe
#   Pause/ScrollLock/PrtSc: VolUp/VolDown/Mute

# NOTE: keyd v2.5.0 parser fails on UTF-8 box-drawing characters in comments
# in this file (works in kinesis.conf — likely a parser bug). Use plain text only.

[ids]
*

[main]
include common
